services:
  app:
    # PHP-FPM container for Laravel
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: hdjv_laravel_app
    working_dir: /var/www
    volumes:
      # Live code sync for development
      - ./:/var/www
      # Use development env file inside the container
      - ./.env.development:/var/www/.env
      # Custom PHP-FPM pool settings
      - ./docker/php-fpm.conf:/usr/local/etc/php-fpm.d/zz-app.conf
    env_file:
      - ./.env.development
    environment:
      # Laravel app settings (placeholders)
      APP_NAME: ${APP_NAME:-HDJV}
      APP_ENV: ${APP_ENV:-local}
      APP_KEY: ${APP_KEY:-base64:base64:FssVjtqtqX1potPcVIeRz8qCYTqpDroFiQzQnZ+DtJY=}
      APP_DEBUG: ${APP_DEBUG:-true}
      APP_URL: ${APP_URL:-http://localhost:8000}
    depends_on:
      - db

  web:
    # Nginx container serving Laravel public folder
    image: nginx:1.25-alpine
    container_name: hdjv_laravel_web
    ports:
      # Access Laravel at http://localhost:8000
      - "8000:80"
    volumes:
      # Serve the same codebase as PHP-FPM
      - ./:/var/www
      # Nginx vhost configuration
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  db:
    # MySQL database container
    image: mysql:8.0
    container_name: hdjv_laravel_db
    command:
      # Ensure proper charset/collation
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    ports:
      # Optional: expose DB to host tools
      - "3307:3306"
    env_file:
      - ./.env.development
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${DB_DATABASE:-hdjv}
    volumes:
      # Persist database data locally
      - db_data:/var/lib/mysql

volumes:
  db_data:
