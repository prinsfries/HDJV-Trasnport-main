[www]
; PHP-FPM pool settings optimized for a development laptop
user = www-data
group = www-data
listen = 9000

pm = dynamic
pm.max_children = 14
pm.start_servers = 4
pm.min_spare_servers = 2
pm.max_spare_servers = 6
pm.max_requests = 500

; Improve responsiveness under concurrent requests
request_terminate_timeout = 60s
request_slowlog_timeout = 10s
slowlog = /proc/self/fd/2

; Ensure correct permissions for Laravel storage/cache
clear_env = no
