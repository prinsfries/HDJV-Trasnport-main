server {
    listen 80;
    server_name localhost;

    # Point to Laravel's public directory
    root /var/www/public;
    index index.php index.html;

    # API CORS handling for local dev (front-end on http://localhost:5173)
    location /api/ {
        # Preflight requests
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin $http_origin always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Requested-With, Accept" always;
            add_header Access-Control-Max-Age 86400 always;
            return 204;
        }

        add_header Access-Control-Allow-Origin $http_origin always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Requested-With, Accept" always;

        try_files $uri $uri/ /index.php?$query_string;
    }

    # Main request handling with SPA-friendly fallback
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Pass PHP scripts to PHP-FPM
    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;
    }

    # Deny access to hidden files (.env, .htaccess, etc.)
    location ~ /\.(?!well-known).* {
        deny all;
    }

    # Cache static assets for quicker local dev reloads
    location ~* \.(?:css|js|jpg|jpeg|gif|png|svg|ico|woff2?)$ {
        expires 1d;
        access_log off;
    }
}
